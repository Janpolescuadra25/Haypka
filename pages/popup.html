<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>R365 & Toast Reconciliation</title>
  <link rel="stylesheet" href="../styles/popup.css">
</head>
<body>
  <div class="container">
    <h1>R365 & Toast Reconciliation</h1>
    
    <div class="status-section">
      <div class="status-card">
        <h3>R365 Entries</h3>
        <div class="count" id="r365Count">0</div>
      </div>
      
      <div class="status-card">
        <h3>Toast Entries</h3>
        <div class="count" id="toastCount">0</div>
      </div>
    </div>

    <div class="button-section">
      <button id="extractR365Btn" class="btn btn-primary">Extract R365 Data</button>
      <button id="extractToastBtn" class="btn btn-primary">Extract Toast Data</button>
      <button id="compareBtn" class="btn btn-success">Compare Entries</button>
      <button id="dashboardBtn" class="btn btn-secondary">View Dashboard</button>
      <button id="settingsBtn" class="btn btn-secondary">Settings</button>
    </div>

    <div id="statusMessage" class="status-message"></div>

    <div class="summary-section" id="summarySection" style="display: none;">
      <h3>Last Comparison</h3>
      <p>Differences: <span id="diffCount">0</span></p>
      <p>Matched: <span id="matchCount">0</span></p>
      <p>Variance: $<span id="variance">0.00</span></p>
    </div>
  </div>

  <script src="../scripts/storage-manager.js"></script>
  <script src="../scripts/comparison-engine.js"></script>
  <script src="popup.js"></script>
</body>
</html>
